services:
  app:
    image: pixlcrashr/snipeit-fast-ux:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snipeit-fast-ux-app
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=production
      - PUBLIC_URL=${PUBLIC_URL}
      - SNIPEIT_API_URL=${SNIPEIT_API_URL}
      - SNIPEIT_OAUTH_CLIENT_ID=${SNIPEIT_OAUTH_CLIENT_ID}
      - SNIPEIT_OAUTH_CLIENT_SECRET=${SNIPEIT_OAUTH_CLIENT_SECRET}
      - SNIPEIT_OAUTH_TOKEN_URL=${SNIPEIT_OAUTH_TOKEN_URL}
      - SNIPEIT_OAUTH_AUTHORIZE_URL=${SNIPEIT_OAUTH_AUTHORIZE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
      - COOKIE_SECURE=${COOKIE_SECURE:-}
      - COOKIE_HTTPONLY=${COOKIE_HTTPONLY:-true}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
