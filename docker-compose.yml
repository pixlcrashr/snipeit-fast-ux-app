services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: snipeit-insert:latest
    container_name: snipeit-insert
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=production
      - SNIPEIT_API_URL=${SNIPEIT_API_URL}
      - SNIPEIT_OAUTH_CLIENT_ID=${SNIPEIT_OAUTH_CLIENT_ID}
      - SNIPEIT_OAUTH_CLIENT_SECRET=${SNIPEIT_OAUTH_CLIENT_SECRET}
      - SNIPEIT_OAUTH_REDIRECT_URI=${SNIPEIT_OAUTH_REDIRECT_URI}
      - SESSION_SECRET=${SESSION_SECRET}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
